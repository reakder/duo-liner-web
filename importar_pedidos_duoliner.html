<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Importar pedidos | DUO-LINER</title>
  <style>
    body{font-family:Inter,Arial,sans-serif;background:#f5f5f2;color:#111;margin:0;padding:40px}
    .card{max-width:860px;margin:auto;background:#fff;border:1px solid #ddd;border-radius:18px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.08)}
    h1{margin:0 0 8px;font-size:34px} p{color:#555;line-height:1.5}.row{display:grid;gap:12px;margin:18px 0}
    input,button{font:inherit;padding:14px;border-radius:12px;border:1px solid #ccc}
    button{background:#111;color:#fff;font-weight:800;cursor:pointer}.log{white-space:pre-wrap;background:#111;color:#e8ffe8;border-radius:14px;padding:18px;min-height:180px;max-height:420px;overflow:auto;margin-top:20px}
    .warn{background:#fff7ed;border:1px solid #fed7aa;padding:12px;border-radius:12px;color:#7c2d12}
  </style>
</head>
<body>
  <div class="card">
    <h1>Importar pedidos DUO-LINER</h1>
    <p>Sube tu Excel con columnas: <b>FECHA, CANTIDAD, DESCRIPCION, PRECIO, TOTAL FACTURA, CLIENTE</b>.</p>
    <div class="warn">Mapeo automático: <b>prodiva</b> → cliente existente que contenga “PRODIVA”; <b>farmaya</b> → cliente existente que contenga “FARMAYA”. No crea clientes duplicados.</div>
    <div class="row">
      <input id="file" type="file" accept=".xlsx,.xls" />
      <button onclick="importar()">Importar pedidos a MongoDB</button>
    </div>
    <div id="log" class="log">Esperando archivo...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const BACKEND_URL = "https://duo-liner-backend.onrender.com";
    const logBox = document.getElementById("log");
    const CLIENTE_MAP = {
      "prodiva": "PRODIVA",
      "farmaya": "FARMAYA"
    };

    function log(msg){ logBox.textContent += "\n" + msg; logBox.scrollTop = logBox.scrollHeight; }
    function normalizar(v){ return String(v || "").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }
    function col(row, names){
      const keys = Object.keys(row);
      for(const name of names){
        const found = keys.find(k => normalizar(k) === normalizar(name));
        if(found) return row[found];
      }
      return "";
    }
    function excelDateToISO(v){
      if(!v) return new Date().toISOString().slice(0,10);
      if(v instanceof Date) return v.toISOString().slice(0,10);
      if(typeof v === "number"){
        const d = XLSX.SSF.parse_date_code(v);
        if(d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
      }
      const s = String(v).trim();
      if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      const d = new Date(s);
      if(!isNaN(d)) return d.toISOString().slice(0,10);
      return s;
    }
    async function apiGet(path){ const r = await fetch(`${BACKEND_URL}${path}`); if(!r.ok) throw new Error(path); return r.json(); }
    async function apiPost(path,data){ const r = await fetch(`${BACKEND_URL}${path}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)}); if(!r.ok) throw new Error(await r.text()); return r.json(); }

    async function importar(){
      logBox.textContent = "Iniciando importación...";
      const file = document.getElementById("file").files[0];
      if(!file){ alert("Selecciona un archivo Excel."); return; }

      const clientes = await apiGet("/clientes");
      log(`Clientes encontrados en MongoDB: ${clientes.length}`);

      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, {type:"array", cellDates:true});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, {defval:""});
      log(`Filas leídas del Excel: ${rows.length}`);

      let ok = 0, omitidos = 0, errores = 0;
      const usados = new Set();

      for(const row of rows){
        const clienteExcel = String(col(row,["CLIENTE","Cliente","cliente"])).trim();
        const clienteKey = normalizar(clienteExcel);
        const buscar = CLIENTE_MAP[clienteKey] || clienteExcel;
        const cliente = clientes.find(c => normalizar(c.nombre).includes(normalizar(buscar)) || normalizar(buscar).includes(normalizar(c.nombre)));

        if(!cliente){
          log(`OMITIDO: no encontré cliente para '${clienteExcel}'`);
          omitidos++;
          continue;
        }

        const fecha = excelDateToISO(col(row,["FECHA","Fecha","fecha"]));
        const cantidad = Number(col(row,["CANTIDAD","Cantidad","cantidad"]) || 0);
        const descripcion = String(col(row,["DESCRIPCION","DESCRIPCIÓN","Descripcion","Descripción","descripcion"])).trim();
        const precio = Number(col(row,["PRECIO","Precio","precio"]) || 0);
        let total_factura = Number(col(row,["TOTAL FACTURA","Total Factura","TOTAL_FACTURA","total_factura"]) || 0);
        if(!total_factura && cantidad && precio) total_factura = cantidad * precio;

        if(!descripcion || !cantidad){
          log(`OMITIDO: fila incompleta (${clienteExcel}, ${fecha})`);
          omitidos++;
          continue;
        }

        const dupKey = `${cliente.id}|${fecha}|${cantidad}|${descripcion}|${total_factura}`;
        if(usados.has(dupKey)){
          log(`DUPLICADO EN EXCEL omitido: ${clienteExcel} ${fecha} ${descripcion}`);
          omitidos++;
          continue;
        }
        usados.add(dupKey);

        const pedido = {
          cliente_id: cliente.id,
          fecha,
          cantidad,
          descripcion,
          producto: descripcion,
          precio,
          total_factura,
          total: total_factura,
          estado: "Nuevo",
          origen: "importacion_excel"
        };

        try{
          await apiPost("/pedidos", pedido);
          ok++;
          log(`OK ${ok}: ${cliente.nombre} | ${fecha} | ${descripcion} | Q${total_factura}`);
        }catch(e){
          errores++;
          log(`ERROR: ${clienteExcel} ${fecha} ${descripcion} -> ${e.message}`);
        }
      }

      log("\n===== RESUMEN =====");
      log(`Importados: ${ok}`);
      log(`Omitidos: ${omitidos}`);
      log(`Errores: ${errores}`);
      log("Listo. Revisa el dashboard de pedidos.");
    }
  </script>
</body>
</html>
